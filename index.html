<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sofa Problem: High-Res Evolution</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.5rem; margin: 10px; color: #00d4ff; }
        #canvas-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        canvas { background: #1a1a1a; border: 1px solid #333; width: 180px; height: 140px; }
        .controls { background: #222; padding: 15px; border-radius: 10px; width: 90%; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; border-bottom: 3px solid #00d4ff; }
        .stat-val { color: #00d4ff; font-weight: bold; font-size: 1.2rem; }
        .io-panel { width: 90%; margin: 15px; display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        button:hover { background: #444; }
        .finished-count { color: #0f0; }
    </style>
</head>
<body>
    <h1>📐 高精度・高速ソファGAシミュレーター</h1>
    
    <div class="controls">
        <div>世代: <span id="gen-label" class="stat-val">1</span></div>
        <div>計算個体数: <span class="stat-val">100</span></div>
        <div>最高進捗: <span id="progress-label" class="stat-val">0</span>%</div>
        <div>最高面積: <span id="area-label" class="stat-val">0</span></div>
        <div>完走成功: <span id="finish-label" class="stat-val finished-count">0</span></div>
    </div>

    <div id="canvas-grid"></div>

    <div class="io-panel">
        <button onclick="exportJSON()">遺伝子をJSONで書き出し</button>
        <button onclick="document.getElementById('fileInput').click()">JSONを読み込んで再開</button>
        <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importJSON(event)">
    </div>

<script>
/**
 * 定数・設定
 */
const TOTAL_POP = 100; // 計算上の個体数
const DISPLAY_COUNT = 20; // 画面に表示する個体数
const UNIT = 40; // 通路の幅
const RESOLUTION = 2; // セル密度（小さいほど高精度。2px刻み）
const STEP_LIMIT = 800; 

class Sofa {
    constructor(gene = null) {
        this.gene = gene || this.createRandomGene();
        this.reset();
    }

    createRandomGene() {
        let commands = [];
        for (let i = 0; i < STEP_LIMIT; i++) {
            commands.push({
                vx: (Math.random() - 0.25) * 4, // 右方向へバイアス
                vy: (Math.random() - 0.5) * 4,
                vr: (Math.random() - 0.5) * 0.12,
            });
        }
        return commands;
    }

    reset() {
        this.x = 20;
        this.y = 120;
        this.rotation = 0;
        this.step = 0;
        this.alive = true;
        this.finished = false;
        this.maxDist = 0;

        // 身体: 1x3 (UNIT x UNIT*3)
        this.cells = [];
        for (let iy = 0; iy < UNIT; iy += RESOLUTION) {
            for (let ix = 0; ix < UNIT * 3; ix += RESOLUTION) {
                this.cells.push({ ox: ix - UNIT * 1.5, oy: iy - UNIT / 2, active: true });
            }
        }
        this.initialArea = this.cells.length;
        this.area = this.initialArea;
    }

    update() {
        if (!this.alive || this.finished || this.step >= STEP_LIMIT) return;

        const g = this.gene[this.step];
        this.rotation += g.vr;
        this.x += g.vx;
        this.y += g.vy;

        this.checkStatus();
        this.step++;
    }

    checkStatus() {
        let activeCount = 0;
        let allInGoalZone = true;
        let anyInCorner = false;

        for (let cell of this.cells) {
            if (!cell.active) continue;

            const rad = this.rotation;
            const cx = this.x + cell.ox * Math.cos(rad) - cell.oy * Math.sin(rad);
            const cy = this.y + cell.ox * Math.sin(rad) + cell.oy * Math.cos(rad);

            // 通路判定
            const inA = (cx >= 0 && cx <= UNIT * 5 && cy >= 100 && cy <= 100 + UNIT);
            const inB = (cx >= UNIT * 4 && cx <= UNIT * 5 && cy <= 100 + UNIT);

            if (!inA && !inB) {
                cell.active = false;
            } else {
                activeCount++;
                if (cy > 100) allInGoalZone = false; // まだ角より下にセルがある
                if (cx > UNIT * 4) anyInCorner = true; 
            }
        }

        this.area = activeCount;
        this.maxDist = Math.max(this.maxDist, this.x);

        if (this.area <= 0) this.alive = false;
        if (activeCount > 0 && allInGoalZone && this.x > UNIT * 4) {
            this.finished = true;
        }
    }

    draw(ctx) {
        ctx.clearRect(0, 0, 250, 200);
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 100, UNIT * 5, UNIT); 
        ctx.fillRect(UNIT * 4, 0, UNIT, 100 + UNIT);
        
        ctx.fillStyle = this.finished ? "#0f0" : (this.alive ? "#00d4ff" : "#ff4444");
        for (let cell of this.cells) {
            if (!cell.active) continue;
            const rad = this.rotation;
            const cx = this.x + cell.ox * Math.cos(rad) - cell.oy * Math.sin(rad);
            const cy = this.y + cell.ox * Math.sin(rad) + cell.oy * Math.cos(rad);
            ctx.fillRect(cx/1.2, cy/1.2, 2, 2); // 描画サイズ調整
        }
    }
}

let sofas = [];
let generation = 1;
const ctxs = [];

function init() {
    const grid = document.getElementById('canvas-grid');
    for (let i = 0; i < TOTAL_POP; i++) {
        if (i < DISPLAY_COUNT) {
            const cvs = document.createElement('canvas');
            cvs.width = 200; cvs.height = 160;
            grid.appendChild(cvs);
            ctxs.push(cvs.getContext('2d'));
        }
        sofas.push(new Sofa());
    }
    loop();
}

function loop() {
    let living = false;
    for (let i = 0; i < TOTAL_POP; i++) {
        sofas[i].update();
        if (i < DISPLAY_COUNT) sofas[i].draw(ctxs[i]);
        if (sofas[i].alive && !sofas[i].finished && sofas[i].step < STEP_LIMIT) living = true;
    }

    if (!living) evolve();
    else requestAnimationFrame(loop);
}

function evolve() {
    sofas.sort((a, b) => {
        const scoreA = (a.finished ? 1000000 : 0) + (a.area * 100) + a.maxDist;
        const scoreB = (b.finished ? 1000000 : 0) + (b.area * 100) + b.maxDist;
        return scoreB - scoreA;
    });

    const best = sofas[0];
    document.getElementById('gen-label').innerText = generation++;
    document.getElementById('area-label').innerText = best.area;
    document.getElementById('progress-label').innerText = Math.min(100, (best.maxDist / 200 * 100).toFixed(1));
    document.getElementById('finish-label').innerText = sofas.filter(s => s.finished).length;

    const nextGen = [new Sofa(JSON.parse(JSON.stringify(best.gene)))]; // エリート
    
    while(nextGen.length < TOTAL_POP) {
        const p1 = sofas[Math.floor(Math.pow(Math.random(), 2) * 10)].gene;
        const p2 = sofas[Math.floor(Math.random() * 20)].gene;
        const child = [];
        for(let i=0; i<STEP_LIMIT; i++) {
            let cmd = Math.random() > 0.5 ? {...p1[i]} : {...p2[i]};
            if(Math.random() < 0.08) { // 変異
                cmd.vr += (Math.random()-0.5) * 0.08;
                cmd.vx += (Math.random()-0.5) * 1.5;
                cmd.vy += (Math.random()-0.5) * 1.5;
            }
            child.push(cmd);
        }
        nextGen.push(new Sofa(child));
    }
    sofas = nextGen;
    sofas.forEach(s => s.reset());
    requestAnimationFrame(loop);
}

function exportJSON() {
    const data = JSON.stringify({ gen: generation, gene: sofas[0].gene });
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `sofa_best_gen${generation}.json`;
    a.click();
}

function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const imported = JSON.parse(e.target.result);
        sofas.forEach(s => {
            s.gene = JSON.parse(JSON.stringify(imported.gene));
            s.reset();
        });
        generation = imported.gen || 1;
    };
    reader.readAsText(file);
}

init();
</script>
</body>
</html>
