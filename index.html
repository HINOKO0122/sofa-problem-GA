<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sofa Problem: Strict Geometry Mode</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #canvas-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 20px; }
        canvas { background: #1a1a1a; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .info { background: #222; padding: 15px; border-radius: 10px; margin-top: 10px; width: 80%; display: flex; justify-content: space-around; border-bottom: 3px solid #00d4ff; }
        .best-log { width: 80%; margin: 10px; }
        textarea { width: 100%; height: 80px; background: #000; color: #0f0; font-family: monospace; border: 1px solid #444; }
        b { color: #00d4ff; }
    </style>
</head>
<body>
    <h1>📏 厳密幾何学ソファ GA</h1>
    <div class="info">
        <div>世代: <b id="gen-label">1</b></div>
        <div>最高面積: <b id="area-label">0</b></div>
        <div>完走数: <b id="finish-label">0</b></div>
    </div>

    <div id="canvas-grid"></div>

    <div class="best-log">
        <p>ベスト遺伝子データ (自動更新):</p>
        <textarea id="gene-data" readonly></textarea>
    </div>

<script>
const POP_SIZE = 20;
const STEP_LIMIT = 800;
const UNIT = 40; // 1単位 = 40px
const PASSAGE_W = UNIT; 
const PASSAGE_L = UNIT * 5; 

class Sofa {
    constructor(gene = null) {
        this.gene = gene || this.createRandomGene();
        this.reset();
    }

    createRandomGene() {
        let commands = [];
        for (let i = 0; i < STEP_LIMIT; i++) {
            commands.push({
                vx: (Math.random() - 0.3) * 3, // 右方向へバイアス
                vy: (Math.random() - 0.5) * 3,
                vr: (Math.random() - 0.5) * 0.1,
                px: (Math.random() - 0.5) * UNIT * 4,
                py: (Math.random() - 0.5) * UNIT
            });
        }
        return commands;
    }

    reset() {
        // 初期位置: 最初の通路(左側)の入り口付近
        this.x = 20;
        this.y = 120;
        this.rotation = 0;
        this.step = 0;
        this.alive = true;
        this.finished = false;
        
        // 身体: 幅4(160px), 高さ1(40px) の長方形
        this.cells = [];
        const res = 4; // 解像度
        for (let iy = 0; iy < UNIT; iy += res) {
            for (let ix = 0; ix < UNIT * 4; ix += res) {
                this.cells.push({ ox: ix - UNIT * 2, oy: iy - UNIT / 2, active: true });
            }
        }
        this.area = this.cells.length;
    }

    update() {
        if (!this.alive || this.finished || this.step >= STEP_LIMIT) return;

        const g = this.gene[this.step];
        this.rotation += g.vr;
        this.x += g.vx;
        this.y += g.vy;

        this.checkStatus();
        this.step++;
    }

    checkStatus() {
        let activeCount = 0;
        let allInGoalZone = true;

        for (let cell of this.cells) {
            if (!cell.active) {
                allInGoalZone = false;
                continue;
            }

            const rad = this.rotation;
            const cx = this.x + cell.ox * Math.cos(rad) - cell.oy * Math.sin(rad);
            const cy = this.y + cell.ox * Math.sin(rad) + cell.oy * Math.cos(rad);

            // 通路の判定領域
            // 領域A: 最初の通路 (0 < x < 5, 2 < y < 3)
            const inA = (cx >= 0 && cx <= PASSAGE_L && cy >= 100 && cy <= 100 + PASSAGE_W);
            // 領域Corner: 角 (5 < x < 6, 2 < y < 3) -> 実際にはAかBに含まれる
            // 領域B: 二つ目の通路 (200 < x < 240, 0 < y < 100)
            const inB = (cx >= 160 && cx <= 160 + PASSAGE_W && cy <= 100 + PASSAGE_W);

            if (!inA && !inB) {
                cell.active = false;
                allInGoalZone = false;
            } else {
                activeCount++;
                // 「二つ目の通路」に完全に入ったかチェック
                // yが100未満のエリアが完全に「角を抜けた先」
                if (cy > 100) allInGoalZone = false; 
            }
        }

        this.area = activeCount;
        if (this.area <= 0) this.alive = false;
        
        // 全セルが領域B（上向き通路）に入り、かつ角(y=100)を完全に超えたら停止
        if (activeCount > 0 && allInGoalZone) {
            this.finished = true;
        }
    }

    draw(ctx) {
        ctx.clearRect(0, 0, 300, 250);
        
        // 通路描画 (1x5 + 1x1 + 5x1)
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 100, 200, 40); // 横
        ctx.fillRect(160, 0, 40, 140);  // 縦
        
        // 境界線
        ctx.strokeStyle = "#555";
        ctx.strokeRect(0, 100, 200, 40);
        ctx.strokeRect(160, 0, 40, 140);

        // ソファ描画
        ctx.fillStyle = this.finished ? "#0f0" : (this.alive ? "#00d4ff" : "#ff4444");
        for (let cell of this.cells) {
            if (!cell.active) continue;
            const rad = this.rotation;
            const cx = this.x + cell.ox * Math.cos(rad) - cell.oy * Math.sin(rad);
            const cy = this.y + cell.ox * Math.sin(rad) + cell.oy * Math.cos(rad);
            ctx.fillRect(cx, cy, 3, 3);
        }
    }
}

let sofas = [];
let generation = 1;
const canvases = [];
const ctxs = [];

function init() {
    const grid = document.getElementById('canvas-grid');
    for (let i = 0; i < POP_SIZE; i++) {
        const cvs = document.createElement('canvas');
        cvs.width = 250; cvs.height = 200;
        grid.appendChild(cvs);
        canvases.push(cvs);
        ctxs.push(cvs.getContext('2d'));
        sofas.push(new Sofa());
    }
    requestAnimationFrame(loop);
}

function loop() {
    let living = false;
    sofas.forEach((s, i) => {
        s.update();
        s.draw(ctxs[i]);
        if (s.alive && !s.finished && s.step < STEP_LIMIT) living = true;
    });

    if (!living) {
        evolve();
    } else {
        requestAnimationFrame(loop);
    }
}

function evolve() {
    // 評価順: 完走フラグ > 面積 > 進捗
    sofas.sort((a, b) => {
        const scoreA = (a.finished ? 1000000 : 0) + (a.area * 100) + a.x;
        const scoreB = (b.finished ? 1000000 : 0) + (b.area * 100) + b.x;
        return scoreB - scoreA;
    });

    const best = sofas[0];
    document.getElementById('gen-label').innerText = generation++;
    document.getElementById('area-label').innerText = best.area;
    document.getElementById('finish-label').innerText = sofas.filter(s => s.finished).length;
    document.getElementById('gene-data').value = JSON.stringify(best.gene);

    const nextGen = [];
    // エリート継承
    nextGen.push(new Sofa(best.gene));
    
    while(nextGen.length < POP_SIZE) {
        const p1 = sofas[Math.floor(Math.random() * 4)].gene;
        const p2 = sofas[Math.floor(Math.random() * 8)].gene;
        const childGene = [];
        for(let i=0; i<STEP_LIMIT; i++) {
            // 交叉
            let cmd = Math.random() > 0.5 ? {...p1[i]} : {...p2[i]};
            // 変異
            if(Math.random() < 0.05) {
                cmd.vr += (Math.random()-0.5) * 0.05;
                cmd.vx += (Math.random()-0.5) * 1;
            }
            childGene.push(cmd);
        }
        nextGen.push(new Sofa(childGene));
    }
    sofas = nextGen;
    sofas.forEach(s => s.reset());
    requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
