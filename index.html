<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sofa GA: Area & Goal Focused</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #222; padding: 15px; width: 100%; text-align: center; border-bottom: 3px solid #ff00ff; }
        .main-layout { display: flex; flex-direction: row; width: 98%; gap: 15px; padding: 15px; }
        
        .side-panel { background: #1a1a1a; padding: 20px; border-radius: 10px; min-width: 250px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-group label { font-size: 0.85rem; color: #ff00ff; }
        input[type=range] { cursor: pointer; accent-color: #ff00ff; }
        
        .stats { background: #000; padding: 10px; border-radius: 5px; border-left: 4px solid #ff00ff; }
        .stat-val { color: #ff00ff; font-weight: bold; font-family: monospace; }

        #canvas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex-grow: 1; }
        canvas { background: #000; border: 1px solid #444; width: 100%; max-width: 380px; height: auto; aspect-ratio: 1/1; }
        
        .io-panel { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 8px; cursor: pointer; background: #333; color: #ff00ff; border: 1px solid #ff00ff; border-radius: 5px; font-size: 0.8rem; }
        button:hover { background: #ff00ff; color: #000; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📐 最大面積・突破優先：1:4 ソファGA</h1>
    </div>

    <div class="main-layout">
        <div class="side-panel">
            <div class="stats">
                <div>世代: <span id="gen-label" class="stat-val">1</span></div>
                <div>最高体積: <span id="area-label" class="stat-val">0.0000</span></div>
                <div>成功個体: <span id="finish-label" class="stat-val">0</span></div>
            </div>

            <div class="slider-group">
                <label>速度変異率 (VX/VY): <span id="val-v-mut">0.50</span></label>
                <input type="range" id="mut-v" min="0.01" max="2.0" step="0.01" value="0.50" oninput="updateParams()">
            </div>

            <div class="slider-group">
                <label>回転変異率 (VR): <span id="val-r-mut">0.0010</span></label>
                <input type="range" id="mut-r" min="0.0001" max="0.01" step="0.0001" value="0.0010" oninput="updateParams()">
            </div>

            <div class="io-panel">
                <button onclick="exportJSON()">JSON保存</button>
                <button onclick="document.getElementById('fileInput').click()">JSON読込</button>
                <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importJSON(event)">
            </div>
            
            <p style="font-size: 0.75rem; color: #777;">
                ※形は無視し、「いかに大きくゴールするか」のみを追求します。
            </p>
        </div>

        <div id="canvas-grid"></div>
    </div>

<script>
const TOTAL_POP = 100;
const DISPLAY_COUNT = 6; 
const UNIT = 60; 
const STEP_LIMIT = 2000; 
const COLS = 400; 
const ROWS = 100;
const INITIAL_AREA = COLS * ROWS;
const CELL_SIZE = UNIT / ROWS; 

let mutationRateV = 0.50;
let mutationRateR = 0.0010;

function updateParams() {
    mutationRateV = parseFloat(document.getElementById('mut-v').value);
    mutationRateR = parseFloat(document.getElementById('mut-r').value);
    document.getElementById('val-v-mut').innerText = mutationRateV.toFixed(2);
    document.getElementById('val-r-mut').innerText = mutationRateR.toFixed(4);
}

class Sofa {
    constructor(gene = null) {
        this.gene = gene || this.createRandomGene();
        this.reset();
    }

    createRandomGene() {
        let commands = [];
        for (let i = 0; i < STEP_LIMIT; i++) {
            commands.push({
                vx: (Math.random() - 0.1) * 4.0, 
                vy: (Math.random() - 0.4) * 3.0, 
                vr: (Math.random() * 0.0016) 
            });
        }
        return commands;
    }

    reset() {
        this.x = UNIT * 2; 
        this.y = UNIT * 0.5; 
        this.rotation = 0;
        this.step = 0;
        this.alive = true;
        this.finished = false;
        this.activeIndices = new Int32Array(INITIAL_AREA);
        for(let i=0; i < INITIAL_AREA; i++) this.activeIndices[i] = i;
        this.activeCount = INITIAL_AREA;
        this.area = this.activeCount;
    }

    update() {
        if (!this.alive || this.finished || this.step >= STEP_LIMIT) return;
        const g = this.gene[this.step];
        this.rotation += g.vr;
        this.x += g.vx;
        this.y += g.vy;
        this.checkCollision();
        this.step++;
    }

    checkCollision() {
        const cos = Math.cos(this.rotation);
        const sin = Math.sin(this.rotation);
        let newCount = 0;
        let allInGoal = true;

        for (let i = 0; i < this.activeCount; i++) {
            const idx = this.activeIndices[i];
            const r = (idx / COLS) | 0;
            const c = idx % COLS;
            const ox = (c - COLS / 2) * CELL_SIZE;
            const oy = (r - ROWS / 2) * CELL_SIZE;
            const cx = this.x + ox * cos - oy * sin;
            const cy = this.y + ox * sin + oy * cos;

            const inA = (cx >= 0 && cx <= UNIT * 6 && cy >= 0 && cy <= UNIT);
            const inB = (cx >= UNIT * 5 && cx <= UNIT * 6 && cy >= 0 && cy <= UNIT * 8);

            if (inA || inB) {
                this.activeIndices[newCount++] = idx;
                if (cx < UNIT * 5) allInGoal = false;
            }
        }
        this.activeCount = newCount;
        this.area = newCount;
        if (this.area <= 0) this.alive = false;
        if (this.area > 0 && allInGoal && this.y > UNIT * 3) this.finished = true;
    }

    removeIslands() {
        // 島抜き処理は面積の正確な評価のために維持
        if (this.activeCount === 0) return;
        const grid = new Uint8Array(INITIAL_AREA).fill(0);
        for(let i=0; i<this.activeCount; i++) grid[this.activeIndices[i]] = 1;
        const visited = new Uint8Array(INITIAL_AREA).fill(0);
        let maxGroup = [];
        for (let i = 0; i < this.activeCount; i++) {
            const startIdx = this.activeIndices[i];
            if (visited[startIdx]) continue;
            let currentGroup = [];
            let stack = [startIdx];
            visited[startIdx] = 1;
            while (stack.length > 0) {
                let idx = stack.pop();
                currentGroup.push(idx);
                const r = (idx / COLS) | 0; const c = idx % COLS;
                const ns = [];
                if (r > 0) ns.push(idx - COLS); if (r < ROWS - 1) ns.push(idx + COLS);
                if (c > 0) ns.push(idx - 1); if (c < COLS - 1) ns.push(idx + 1);
                for (let n of ns) { if (grid[n] === 1 && !visited[n]) { visited[n] = 1; stack.push(n); } }
            }
            if (currentGroup.length > maxGroup.length) maxGroup = currentGroup;
        }
        this.activeCount = maxGroup.length;
        for (let i = 0; i < maxGroup.length; i++) this.activeIndices[i] = maxGroup[i];
        this.area = this.activeCount;
    }

    draw(ctx) {
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, UNIT * 6, UNIT); 
        ctx.fillRect(UNIT * 5, 0, UNIT, UNIT * 8); 

        ctx.fillStyle = this.finished ? "#0f0" : (this.alive ? "#ff00ff" : "#555");
        const cos = Math.cos(this.rotation);
        const sin = Math.sin(this.rotation);
        for (let i = 0; i < this.activeCount; i += 2) {
            const idx = this.activeIndices[i];
            const r = (idx / COLS) | 0; const c = idx % COLS;
            const ox = (c - COLS / 2) * CELL_SIZE; const oy = (r - ROWS / 2) * CELL_SIZE;
            const cx = this.x + ox * cos - oy * sin; const cy = this.y + ox * sin + oy * cos;
            ctx.fillRect(cx, cy, 1, 1);
        }

        ctx.strokeStyle = "rgba(255, 0, 255, 0.2)";
        ctx.lineWidth = 1;
        for(let i=0; i<6; i++) ctx.strokeRect(i * UNIT, 0, UNIT, UNIT);
        for(let i=0; i<8; i++) ctx.strokeRect(UNIT * 5, i * UNIT, UNIT, UNIT);
    }
}

let sofas = [];
let generation = 1;
const ctxs = [];

function init() {
    const grid = document.getElementById('canvas-grid');
    grid.innerHTML = ""; 
    for (let i = 0; i < DISPLAY_COUNT; i++) {
        const cvs = document.createElement('canvas');
        cvs.width = 400; cvs.height = 400;
        grid.appendChild(cvs);
        ctxs.push(cvs.getContext('2d'));
    }
    for (let i = 0; i < TOTAL_POP; i++) sofas.push(new Sofa());
    requestAnimationFrame(loop);
}

function loop() {
    let living = false;
    for (let i = 0; i < TOTAL_POP; i++) {
        sofas[i].update();
        if (i < DISPLAY_COUNT) sofas[i].draw(ctxs[i]);
        if (sofas[i].alive && !sofas[i].finished && sofas[i].step < STEP_LIMIT) living = true;
    }
    if (!living) {
        sofas.forEach(s => s.removeIslands());
        evolve();
    } else {
        requestAnimationFrame(loop);
    }
}

function evolve() {
    // 【修正】面積と完走のみで評価
    sofas.sort((a, b) => {
        const scoreA = (a.finished ? 1e12 : 0) + a.area;
        const scoreB = (b.finished ? 1e12 : 0) + b.area;
        return scoreB - scoreA;
    });

    const best = sofas[0];
    document.getElementById('gen-label').innerText = generation++;
    document.getElementById('area-label').innerText = (best.area / 10000).toFixed(4);
    document.getElementById('finish-label').innerText = sofas.filter(s => s.finished).length;

    const nextGen = [new Sofa(JSON.parse(JSON.stringify(best.gene)))];
    while(nextGen.length < TOTAL_POP) {
        const p = sofas[Math.floor(Math.pow(Math.random(), 2) * 30)].gene;
        const child = p.map(cmd => {
            const mutation_r = (Math.random() - 0.45) * mutationRateR; 
            return {
                vx: cmd.vx + (Math.random()-0.5) * mutationRateV,
                vy: cmd.vy + (Math.random()-0.5) * mutationRateV,
                vr: cmd.vr + mutation_r
            };
        });
        nextGen.push(new Sofa(child));
    }
    sofas = nextGen;
    sofas.forEach(s => s.reset());
    requestAnimationFrame(loop);
}

function exportJSON() {
    const data = JSON.stringify({ gen: generation, gene: sofas[0].gene });
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `sofa_area_focused.json`; a.click();
}
function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const imported = JSON.parse(e.target.result);
        sofas.forEach(s => { s.gene = JSON.parse(JSON.stringify(imported.gene)); s.reset(); });
        generation = imported.gen || 1;
    };
    reader.readAsText(file);
}

init();
</script>
</body>
</html>
